<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>PaperLean 控制面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen text-slate-900">
    <div class="max-w-[1600px] mx-auto p-6">
        <header class="flex justify-between items-center mb-8 border-b pb-4">
            <h1 class="text-2xl font-bold text-indigo-600">PaperLean Platform</h1>
            <div class="text-sm text-slate-400">人人都是数学家</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-6 flex items-center">
                    <span class="w-2 h-6 bg-indigo-500 rounded mr-2"></span>新建解析项目
                </h2>
                <form id="projectForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">项目名称</label>
                        <input type="text" id="name" required
                            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">PDF 文件</label>
                        <input type="file" id="pdfFile" accept=".pdf" required
                            class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">选择国内大模型</label>
                        <select id="agentType" class="w-full px-3 py-2 border rounded-lg outline-none">
                            <option value="qwen3.5-flash">qwen3.5-flash </option>
                            <option value="qwen3.6-flash">qwen3.6-flash 适配复杂场景，达到领域SOTA水平</option>
                            <option value="qwen3.6-plus">qwen3.6-plus</option>
                            <option value="qwen3.5-plus-2026-02-15">qwen3.5-plus-2026-02-15</option>
                            <option value="qwen3.6-plus-2026-04-02">qwen3.6-plus-2026-04-02</option>
                            <option value="qwen3.6-max-preview">qwen3.6-max-preview</option>
                            <option value="deepseek-v4-pro">deepseek-v4-pro</option>
                            <option value="deepseek-v4-flash">deepseek-v4-flash</option>
                        </select>
                    </div>
                    <button type="button" id="uploadBtn" onclick="handleUpload()"
                        class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition disabled:bg-slate-400">
                        上传并解析
                    </button>
                </form>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-6 flex items-center">
                    <span class="w-2 h-6 bg-amber-500 rounded mr-2"></span>处理中队列
                </h2>
                <div id="queueList" class="space-y-4">
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-6 flex items-center">
                    <span class="w-2 h-6 bg-emerald-500 rounded mr-2"></span>已完成项目
                </h2>
                <div id="doneList" class="space-y-4">
                </div>
            </section>
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-3">
                <div class="flex justify-between items-center mb-6 pb-2 border-b border-slate-100">
                    <div>
                        <h2 class="text-lg font-bold flex items-center">
                            <span class="w-2 h-6 bg-indigo-500 rounded mr-2"></span>Global Agent 核心调度控制台
                        </h2>
                        <div class="mt-2 text-xs text-slate-500">自动重启上次运行中的任务：<span id="autoResumeStatus">加载中...</span></div>
                    </div>
                    <div class="flex gap-3 items-center">
                        <button id="toggleAutoResumeBtn" onclick="toggleAutoResume()"
                            class="px-3 py-1 text-xs bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition">
                            开关自动重启
                        </button>
                        <span
                            class="px-2.5 py-1 bg-amber-50 border border-amber-200 text-amber-700 rounded-full font-medium">
                            正在运行: <span id="summaryRunning" class="font-bold">0</span>
                        </span>
                        <span
                            class="px-2.5 py-1 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-full font-medium">
                            已成功: <span id="summarySuccess" class="font-bold">0</span>
                        </span>
                        <span
                            class="px-2.5 py-1 bg-rose-50 border border-rose-200 text-rose-700 rounded-full font-medium">
                            已失败: <span id="summaryFail" class="font-bold">0</span>
                        </span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="globalAgentGrid">
                    <div class="text-slate-400 text-sm p-4 text-center col-span-full">
                        暂无活跃的项目并发调度，等待工作流触发...
                    </div>
                </div>
            </section>
        </div>

    </div>

    <script>
        let isUploading = false;
        let autoResumeEnabled = false;

        function getStatusClass(status) {
            switch (status) {
                case 'success':
                    return 'bg-emerald-100 text-emerald-700';
                case 'fail':
                    return 'bg-red-100 text-red-700';
                case 'running':
                    return 'bg-amber-100 text-amber-700 animate-pulse';
                default:
                    return 'bg-slate-100 text-slate-600';
            }
        }

        async function handleUpload() {
            if (isUploading) return;
            const nameInput = document.getElementById('name');
            const fileInput = document.getElementById('pdfFile');
            const agentType = document.getElementById('agentType').value;
            const btn = document.getElementById('uploadBtn');

            if (!nameInput.value.trim() || !fileInput.files[0]) {
                alert("⚠️ 请输入项目名称并选择 PDF 文件");
                return;
            }

            try {
                isUploading = true;
                btn.disabled = true;
                btn.innerText = "正在上传...";

                const formData = new FormData();
                formData.append('name', nameInput.value.trim());
                formData.append('agent_type', agentType);
                formData.append('file', fileInput.files[0]);

                const res = await fetch('/api/projects', {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    nameInput.value = "";
                    fileInput.value = "";
                    await refreshLists();
                } else {
                    const err = await res.json();
                    alert("上传失败: " + (err.detail || "未知错误"));
                }
            } catch (error) {
                alert("网络异常，请检查后端");
            } finally {
                isUploading = false;
                btn.disabled = false;
                btn.innerText = "上传并解析";
            }
        }

        async function refreshLists() {
            try {
                const res = await fetch('/api/projects');
                const projects = await res.json();

                const queueEl = document.getElementById('queueList');
                const doneEl = document.getElementById('doneList');

                queueEl.innerHTML = '';
                doneEl.innerHTML = '';

                projects.forEach(p => {
                    // 1. 映射状态的视觉样式与中文文本
                    let statusConfig = {
                        'idle': {
                            text: '等待启动',
                            color: 'bg-slate-100 text-slate-700 border-slate-300'
                        },
                        'pending': {
                            text: '排队等待',
                            color: 'bg-amber-50 text-amber-700 border-amber-200 animate-pulse'
                        },
                        'running': {
                            text: '深度解析中',
                            color: 'bg-indigo-50 text-indigo-700 border-indigo-200 animate-pulse'
                        },
                        'success': {
                            text: '编译成功',
                            color: 'bg-emerald-50 text-emerald-700 border-emerald-200'
                        },
                        'fail': {
                            text: '解析失败',
                            color: 'bg-rose-50 text-rose-700 border-rose-200'
                        }
                    };

                    // 容错处理
                    const config = statusConfig[p.status] || {
                        text: p.status,
                        color: 'bg-slate-100 text-slate-700 border-slate-300'
                    };

                    // 2. 核心门禁控制：判断当前状态是否允许物理删除
                    const isActionLocked = (p.status === 'running' || p.status === 'pending');

                    // 锁定时：按钮灰色 + 不可点击；未锁定：正常红色可删除
                    const btnClass = isActionLocked ?
                        "bg-gray-300 cursor-not-allowed pointer-events-none" :
                        "bg-rose-500 hover:bg-rose-600";

                    // 点击事件：锁定时弹出提示，否则正常删除
                    const clickEvent = isActionLocked ?
                        "alert('项目正在解析/排队中，无法删除！')" :
                        `deleteProject('${p.id}')`;

                    const card = `
    <div class="p-4 border rounded-xl bg-white relative hover:shadow-md transition-shadow group">
        <button onclick="${clickEvent}" 
                class="absolute -top-2 -right-2 w-6 h-6 text-white rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center active:scale-90 z-10 ${btnClass}"
                title="${isActionLocked ? '正在解析，无法删除' : '删除项目'}">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
                        <div class="text-[10px] text-slate-400 mb-1 flex justify-between">
                            <span>ID: ${p.id}</span>
                            <span class="px-1.5 py-0.5 rounded ${getStatusClass(p.status)}">${p.status}</span>
                        </div>
                        <div class="mb-1">
                            <a href="/static/project.html?id=${p.id}" 
                            class="font-bold text-indigo-600 hover:text-indigo-800 hover:underline decoration-2 underline-offset-4 transition-all">
                                ${p.name}
                            </a>
                        </div>
                        <div class="text-xs truncate text-slate-400 italic">${p.filename}</div>
                        
                        ${p.status === 'created' ? `
                            <button onclick="runProject('${p.id}')" 
                                    class="mt-3 w-full text-xs bg-emerald-500 hover:bg-emerald-600 text-white py-2 rounded-lg font-bold transition-colors">
                                开始解析并转化
                            </button>
                        ` : `
                            <a href="/static/project.html?id=${p.id}" 
                            class="mt-3 block text-center text-xs text-slate-500 border border-slate-200 py-2 rounded-lg hover:bg-slate-50 transition-colors">
                                查看详情
                            </a>
                        `}
                    </div>`;

                    if (p.status === 'success' || p.status === 'fail') {
                        doneEl.innerHTML += card;
                    } else {
                        queueEl.innerHTML += card;
                    }
                });
            } catch (e) {
                console.error("刷新列表失败", e);
            }
        }

        async function fetchAutoResumeState() {
            try {
                const res = await fetch('/api/config/auto-resume');
                if (!res.ok) return;
                const data = await res.json();
                autoResumeEnabled = data.auto_resume_on_startup === true;
                updateAutoResumeButton();
            } catch (err) {
                console.error('获取自动重启配置失败', err);
            }
        }

        async function toggleAutoResume() {
            try {
                const res = await fetch('/api/config/auto-resume', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ enabled: !autoResumeEnabled })
                });
                if (!res.ok) {
                    console.error('更新自动重启配置失败', res.status);
                    return;
                }
                const data = await res.json();
                autoResumeEnabled = data.auto_resume_on_startup === true;
                updateAutoResumeButton();
            } catch (err) {
                console.error('切换自动重启失败', err);
            }
        }

        function updateAutoResumeButton() {
            const btn = document.getElementById('toggleAutoResumeBtn');
            const status = document.getElementById('autoResumeStatus');
            if (!btn || !status) return;
            if (autoResumeEnabled) {
                btn.innerText = '自动重启：已开启';
                btn.className = 'px-3 py-1 text-xs bg-emerald-500 text-white rounded-xl hover:bg-emerald-600 transition';
                status.innerText = '已开启';
            } else {
                btn.innerText = '自动重启：已关闭';
                btn.className = 'px-3 py-1 text-xs bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition';
                status.innerText = '已关闭';
            }
        }

        async function runProject(id) {
            await fetch(`/api/projects/${id}/run`, {
                method: 'POST'
            });
            window.location.href = `/static/project.html?id=${id}`;
        }

        async function deleteProject(id) {
            if (!confirm("确定要彻底删除该项目吗？这会移除所有已生成的中间文件。")) {
                return;
            }
            try {
                const res = await fetch(`/api/projects/${id}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    await refreshLists();
                } else {
                    const err = await res.json();
                    alert("删除失败: " + (err.detail || "未知错误"));
                }
            } catch (error) {
                console.error("删除请求失败", error);
                alert("网络异常，请检查后端 API");
            }
        }
        // 全局 Agent 调度拓扑实时拉取渲染
        async function refreshGlobalAgentTopology() {
            const gridEl = document.getElementById('globalAgentGrid');
            try {
                const res = await fetch('/api/agents/global-status');
                if (!res.ok) return;
                const data = await res.json();

                // 1. 刷新顶部汇总计数
                document.getElementById('summaryRunning').innerText = data.summary.running_slots;
                document.getElementById('summarySuccess').innerText = data.summary.success_count;
                document.getElementById('summaryFail').innerText = data.summary.fail_count;

                // 2. 渲染微观并发卡片槽位
                if (!data.slots || data.slots.length === 0) {
                    gridEl.innerHTML =
                        `<div class="text-slate-400 text-xs p-6 text-center col-span-full">当前无活跃 Agent 调度任务，系统处于静默监听状态。</div>`;
                    return;
                }

                gridEl.innerHTML = data.slots.map(slot => {
                    // 依据不同的状态和步骤，定制高亮样式与小徽章
                    let borderClass = "border-slate-200 bg-slate-50/50";
                    let badgeClass = "bg-slate-100 text-slate-500 border-slate-300";
                    let pulseDot = "";

                    if (slot.status === 'running') {
                        borderClass = "border-indigo-200 bg-indigo-50/20 ring-1 ring-indigo-500/5";
                        badgeClass = "bg-indigo-50 text-indigo-700 border-indigo-200";
                        pulseDot =
                            `<div class="w-2 h-2 bg-indigo-500 rounded-full animate-ping absolute top-4 right-4"></div>`;
                    } else if (slot.status === 'success') {
                        borderClass = "border-emerald-200 bg-emerald-50/10";
                        badgeClass = "bg-emerald-50 text-emerald-700 border-emerald-200";
                    } else if (slot.status === 'fail') {
                        borderClass = "border-rose-200 bg-rose-50/10";
                        badgeClass = "bg-rose-50 text-rose-700 border-rose-200";
                    }

                    return `
                <div class="border rounded-2xl p-4 relative flex flex-col justify-between transition-all duration-300 hover:shadow-md ${borderClass}">
                    ${pulseDot}
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs font-bold text-slate-800 truncate max-w-[140px]">${slot.project_name}</span>
                            <span class="text-[10px] font-mono text-slate-400">#${slot.project_id.substring(0, 8)}</span>
                        </div>
                        
                        <div class="flex items-center gap-1.5 mb-3">
                            <span class="text-[9px] text-slate-400 uppercase font-tracking-wider">Active Agent:</span>
                            <span class="px-2 py-0.5 text-[10px] font-mono font-bold rounded-md border ${badgeClass}">
                                ${slot.active_agent}
                            </span>
                        </div>
                    </div>

                    <div class="mt-2 pt-2 border-t border-slate-100/70">
                        <p class="text-[11px] text-slate-500 leading-relaxed truncate" title="${slot.status_msg}">
                            ${slot.status_msg}
                        </p>
                    </div>
                </div>
            `;
                }).join('');

            } catch (err) {
                console.error("全局 Agent 状态拓扑网络总线读取异常:", err);
            }
        }

        // 挂载高频 3秒 轮询，平滑监控全网并发
        setInterval(refreshGlobalAgentTopology, 3000);
        // 页面加载时立即执行一次初始化渲染
        document.addEventListener("DOMContentLoaded", () => {
            refreshGlobalAgentTopology();
            fetchAutoResumeState();
        });
        // 
        setInterval(refreshLists, 5000);
        refreshLists();
        fetchGlobalLogs();
    </script>
</body>

</html>
